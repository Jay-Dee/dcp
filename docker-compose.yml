services:
  device-compliance-api:
    image: node:22-alpine

    container_name: device-compliance-api

    working_dir: /app

    volumes:
      - ./backend/device-compliance-api:/app

    command: sh -c "npm install && npm run dev"

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: debug